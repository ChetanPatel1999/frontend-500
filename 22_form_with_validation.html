
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration with validation </title>
</head>

<body>
    <h3>Rgistration page :</h3>
    <form action="submit.html" method="get" target="_self" autocomplete="on">

        <table>
         <!-- <tr><th>Name : </th> <td><input type="text" name="uname" value="ram sharma" readonly disabled ></td></tr> -->
         <tr><th>Name : </th> <td><input type="text" name="uname" placeholder="Enter your name" title="enter name" required  pattern="[a-zA-Z ]+"  ></td></tr>
         <tr><th>Father Name: </th> <td><input type="text" name="fname" placeholder="Enter Father name" required pattern="[a-zA-Z ]+" ></td></tr>
         <tr><th>Password:</th> <td><input type="password" name="pass" placeholder="Enter Password" required  minlength="4"  maxlength="8"></td></tr>
         <tr><th>Mobile:</th> <td><input type="text" name="mobile" placeholder="Enter mobile Number " required pattern="[0-9]+"  maxlength="10"  minlength="10"></td></tr>
         <!-- type="radio" :- its make radio button inside form -->
         <tr><th>Gender:</th> <td> Male<input type="radio" name="gen"  value="male" required>   Female <input type="radio" name="gen" value="female" required> </td></tr>
          <!--  type="checkbox"  :-  its make check box in form  -->
         <tr><th>Hobbies:</th> <td> Cricket<input type="checkbox" name="hobbi"  value="cricket">  Football<input type="checkbox" name="hobbi"  value="football"> Running<input type="checkbox" name="hobbi"  value="running">   </td></tr>
         <tr>
            <th>Select State :  </th>
          <!-- select tag is used to make dropdown list -->
            <td>
                 <select name="state" required>
                   <option selected value="">---</option>
                   <option value="madhaypradesh">MP</option>
                   <option value="uttarPradesh">UP</option>
                   <option >RJ</option>
                   <option >MH</option>
                 </select>
            </td>
        </tr>
        <tr>
            <th>Select Skill :  </th>
          <!-- dropdown list with multiple item selection -->
            <td>
                 <select name="skill" multiple  size="4">
                   <option>C/C++</option>
                   <option selected>python</option>
                   <option>java</option>
                   <option>HTML</option>
                   <option>CSS</option>
                   <option>Javascript</option>
                   <option>MYSQL</option>
                 </select>
            </td>
        </tr>
        <tr><th>File :</th><td><input  type="file" name="file"  required ></td></tr>
        <tr><th>Files :</th><td><input  type="file" name="files" multiple  required></td></tr>
        <tr><td> <input style="margin-left: 40px;"  type="checkbox"  required> </td><th><span style="margin-left: -50px;">i agree all term and condition</span></th></tr>

         <tr> <td></td> <td> <input  type="submit" value="register"> <input type="reset" value="clear"></td></tr>
            </table>
   
    </form>
</body>

</html>
