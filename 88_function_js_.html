<script>
    function addition() {
        let a, b, c;
        a = 12;
        b = 6;
        c = a + b;
        console.log("addition = ", c)
    }

    function subtraction() {
        let a, b, c;
        a = 12;
        b = 6;
        c = a - b;
        console.log("subtraction = ", c)
    }

    function cube() {
        let num = 5;
        let res;
        res = num * num * num;
        console.log(`cube of ${num} = ${res}`)
    }


    function greeting() {
        console.log("good morning students");
    }


    //function calling

    addition();
    subtraction();
    cube();


    for (let i = 1; i <= 5; i++) //3
    {
        greeting();
    }
</script>
