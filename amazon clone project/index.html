<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <div class="nav-bar">
            <div class="logo-box border">
                <div class="logo ">

                </div>
            </div>
            <div class="address border">
                <p class="add-para">Deliver to</p>
                <div class="add-logo">
                    <i class="fa-solid fa-location-dot"></i>
                    <p>India</p>
                </div>
            </div>
            <div class="nav-search">
                <select class="search-select">
                    <option>All</option>
                </select>
                <input class="search-input" type="text" placeholder="Search Amazon">
                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
            <div class="nav-sign-box border">
                <p>Hello,sign in</p>
                <h4>Account & Lists</h4>
            </div>
            <div class="nav-sign-box border " style="width: 80px;">
                <p>Returns</p>
                <h4>& Orders</h4>
            </div>
            <div class="nav-cart border">
                <i class="fa-solid fa-cart-shopping"></i>
                Cart
            </div>
        </div>
        <div class="panle">
            <div class="panle-icon border">
                <i class="fa-solid fa-bars"></i>
                All
            </div>
            <p>Today's Deals</p>
            <p>Gift Card</p>
            <p>Sell</p>
            <p>Registry</p>
            <p>Prime Video</p>
            <p>Customer Services</p>
        </div>

    </header>
    <div class="hero">
        <div class="hero-para">
            <p> You are on amazon.com. You can also shop on Amazon India for millions of products with fast local
                delivery. <a>Click here to go to amazon.in</a></p>
        </div>
    </div>
</body>

</html>
