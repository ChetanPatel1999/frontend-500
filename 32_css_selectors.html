<!-- 
css selectors :-   its use to select  html element inside style tag 
1. universal selector
2. element selector
3. id selector
4. class selector
-->
<style>
    /* universal selector */
    /* 
    * {
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        margin: 0;
    }
     */

    /* h1 is element selector */

    h1 {
        color: red;
        background-color: burlywood;
    }

    /* p is element selector */
    p {
        color: white;
        background-color: blue;
        /* font-size: 30px; */
    }

    button {
        background-color: darkgreen;
        color: white;
        width: 100px;
        height: 40px;
    }

    a,
    h3,
    h4 {
        color: red;
        background-color: darkorange;
    }

    #para3 {
        font-size: 30px;
    }

    #heading {
        font-family: cursive;
    }

    .my-para {
        background-color: red;
    }

    .btn {
        background-color: red;
    }
</style>

<body>
    <h1>hello world institute</h1>
    <h3>chetan patel</h3>
    <p class="my-para">Lorem ipsum, dolor sit amet consectetur </p>
    <p class="my-para">Lorem ipsum, dolor sit amet consectetur </p>
    <p id="para3">Lorem ipsum, dolor sit amet consectetur </p>
    <p class="my-para">Lorem ipsum, dolor sit amet consectetur </p>
    <a href="#">go home</a> <br><br>
    <h4>above is anchor tag</h4>
    <button class="btn">click me !</button>
    <h1 id="heading">indore city</h1>
</body>
