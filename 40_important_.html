<!-- 
  important keyword :-  its given more priority of html selectors 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #my-id {
            background-color: yellow !important;
            font-family: 'Times New Roman', Times, serif;
        }

        .my-class {
            background-color: red !important;
            font-family: cursive !important;
        }
    </style>
</head>

<body>
    <h1 id="my-id" class="my-class" style="background-color: aqua !important;">hello world institue</h1>
</body>

</html>
