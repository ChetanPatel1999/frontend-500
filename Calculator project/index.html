<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="calculator">
        <input id="input-box" type="text" placeholder="0" readonly>
        <div class="btn-box">
            <button class="btn text-green">AC</button>
            <button class="btn text-green">DEL</button>
            <button class="btn text-green">%</button>
            <button class="btn text-green">/</button>
        </div>
        <div class="btn-box">
            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">9</button>
            <button class="btn text-green">*</button>
        </div>
        <div class="btn-box">
            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
            <button class="btn text-green">-</button>
        </div>
        <div class="btn-box">
            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
            <button class="btn text-green">+</button>
        </div>
        <div class="btn-box">
            <button class="btn">00</button>
            <button class="btn">0</button>
            <button class="btn">.</button>
            <button class="btn" style="background-color: orange;">=</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
