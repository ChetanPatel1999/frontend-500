<!-- 
 unorderd list tag make a list without numbering.
 tag name is  "ul" 
-->
 <body style="background-color: cyan;">
    <ul>
        <li>apple</li>
        <li>orange</li>
        <li>banana</li>
    </ul>

    <ul type="circle">
        <li>apple</li>
        <li style="color: orange;">orange</li>
        <li>banana</li>
    </ul>

     <ul type="square">
        <li>apple</li>
        <li>orange</li>
        <li>banana</li>
    </ul>

    <!-- nested list  -->

     <ul type="square">
        <li>apple</li>
        <ul>
            <li>book</li>
            <li>pen</li>
            <li>pencil</li>
        </ul>
        <li>orange</li>
            <ol>
                <li>c++</li>
                <li>java</li>
                <li>python</li>
            </ol>
        <li>banana</li>
    </ul>
 </body>
