<script>
    function square(num) {
        let s;
        s = num * num;
        return s;
    }

    //wap to check given number square is even or odd
    let num = 5;
    if (square(num) % 2 == 0) {
        console.log(`${num} square is even`)
    }
    else {
        console.log(`${num} square is odd`)
    }


    let a = 6;
    let b = 7;
    let sum = square(a) + square(b);
    console.log("sum of squares = ", sum)
    
</script>
