<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            background-color: yellow;
        }

        h1:hover {
            background-color: red;
            color: white;
        }

        #btn {
            /* opacity: 10%; */
            width: 120px;
            height: 40px;
            margin-left: 50px;
            border-radius: 5px;
            background-color: blue;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border: none;

        }

        #btn:hover {
            background-color: red;
            border-radius: 10px;
        }

        #img {
            width: 300px;
            display: block;
            margin-top: 100px;
            border: 10px solid black;
        }

        #img:hover {
            border-radius: 50%;
            opacity: 50%;
            /* visibility: hidden; */
            display: none;
        }

        p {
            border: 2px solid red;
            height: 100px;
            background-color: aqua;
        }

        p:hover {
            /* visibility: hidden; */
            background-color: chartreuse;
            font-weight: bolder;
            font-size: 20PX;
        }
    </style>
</head>

<body>
    <h1>hello world institute</h1>
    <button id="btn">click me ! </button>
    <img id="img" src="images/fox.jpg">

</html>
