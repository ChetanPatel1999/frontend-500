<!-- function with return  stmnt -->
<script>
    function addition(a, b) {
        let c;
        c = a + b;
        return c;
    }

    let res = addition(12, 5)
    console.log("addition = ", res)

    console.log(addition(56, 10))

    console.log(`addition = ${addition(4, 5)}`)
    console.log(`sum = ${addition(40, 5)}`)
    console.log(`my ans = ${addition(40, 50)}`)

</script>
