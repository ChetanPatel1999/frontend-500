<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            text-align: center;
        }

        header {
            background-color: blue;
            color: white;
            padding: 20px;
        }

        header nav a {
            color: white;
            text-decoration: none;
            background-color: white;
            padding: 10px;
            border-radius: 10px;
            color: blue;
            font-weight: bolder;
        }

        header nav a:hover {
            color: red;
        }

        header nav ul {
            list-style: none;
        }

        header nav ul li {
            display: inline-block;
            margin: 20px;
        }

        #main {
            background-color: lightblue;
            height: 400px;
        }

        .box {
            height: 300px;
            width: 200px;
            /* background-color: blueviolet; */
            /* border: 2px solid blueviolet; */
            border-radius: 10px;
            margin-top: 5px;
            display: inline-block;
            margin: 50px;
        }

        img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        footer {
            background-color: burlywood;
            padding: 30px;
            font-weight: bolder;
        }
    </style>
</head>

<body>
    <header>
        <h1>welcome to my website</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Gallary</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <div id="main">
        <div class="box"><img src="images/cat.jpg"></div>
        <div class="box"><img src="images/cat.jpg"></div>
        <div class="box"><img src="images/cat.jpg"></div>
        <div class="box"><img src="images/cat.jpg"></div>
    </div>
    <footer>

        <p>all copyright reseverd by hello wolrd institute</p>
    </footer>
</body>

</html>
