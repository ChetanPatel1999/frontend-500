<!-- Units in css 
there are two types unit in css
absolute Units :-  its fixed width and height units means its not customize
according to screen size and parent element size.
px :- pixle
cm :- centi meter
mm :- milli meter 10mm = 1 cm
in : inch  1 inch= 2.54 cm

Relative Units:-  relative units size depends on  other elements like parent, screen etc.

%  :- parent to child effect
em :- font size of parent , in the case of  "font-size"
em :- font size of itself , in the other propertice like "width" 
rem :- (root em ) font size of root element  

Other :- use some times
vh:- relative to 1% view port height
vw :-  relative to 1% view port width   
-->
