<!-- 
   form tag :-   form tag is used to take input from user and send 
                  data on server/backend.

   method :-
   get:-  its show data in url (not secure)
          its fast compare then post
          using get we can send less data in backend ( 2kb tantative)
          use in search bar or not sensitive info
          when we develop web application
   
   post:- its hide data in url ( secure)
          its slower compare then get
          using post we can send larg data in backend
          when you create registration form , login form

-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
</head>

<body>
    <h3>Rgistration page :</h3>
    <form action="submit.html" method="get" target="_self" autocomplete="on">
        Name: <input type="text" name="uname" > <br><br>
        Father Name: <input type="text" name="fname"> <br><br>
        Password: <input type="password" name="pass"> <br><br>
        <input type="submit" value="register"> <input type="reset" value="clear">
    </form>
</body>

</html>
