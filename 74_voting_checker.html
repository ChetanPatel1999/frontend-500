<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote eligibility checker</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to left, blue, purple);
        }

        .box {
            /* border: 2px solid black; */
            width: 400px;
            height: 400px;
            border-radius: 20px;
            background-color: rgb(30, 143, 181);
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
        }

        #check {}

        #res {}

        button {
            outline: none;
            border: none;
            width: 200px;
            height: 40px;
            font-weight: 900;
            font-size: 18px;
            border-radius: 10px;

        }

        input {
            padding-left: 20px;
            outline: none;
            border-radius: 10px;
            border: none;
            width: 300px;
            height: 40px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1 id="check">voter checker</h1>
        <input id="input" type="text" placeholder="Enter your age ">
        <button onclick="ageCheker()">check</button>
        <h1 id="res">display result</h1>
    </div>
    <script>
        function ageCheker() {
            let age = Number(document.getElementById("input").value);
            // document.getElementById("input").value = ""
            if (age >= 18) {
                document.getElementById("res").innerText = "you can vote";
            }
            else {
                document.getElementById("res").innerText = "you can not vote";
            }
        }
    </script>
</body>

</html>
