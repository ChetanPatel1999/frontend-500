<script>
    let num = Number(prompt("Welcome my calsy\n1. addition\n2. sub\n3.mul\n4.div\nenter a num : "))
    let a, b, c;
    switch (num) {
        case 1:
            a = Number(prompt("enter a : "))
            b = Number(prompt("enter b : "))
            c = a + b;
            console.log("addition : ", c);
            break;
        case 2:
            a = Number(prompt("enter a : "))
            b = Number(prompt("enter b : "))
            c = a - b;
            console.log("subtraction : ", c);
            break;
        case 3:
            a = Number(prompt("enter a : "))
            b = Number(prompt("enter b : "))
            c = a * b;
            console.log("mul : ", c);
            break;
        case 4:
            a = Number(prompt("enter a : "))
            b = Number(prompt("enter b : "))
            c = a - b;
            console.log("subtraction : ", c);
            break;
        default:
            alert("wrong input");
    }
</script>
