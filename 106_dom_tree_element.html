<!-- What is the DOM Tree?

DOM (Document Object Model) represents an HTML page as a tree-like structure — where:

Each HTML tag is a node (element).

Elements inside other elements are child nodes.

Elements that contain other elements are parent nodes.


element.parentElement :- return parent element 

element.children:-Returns all child elements

console.log(parent.firstElementChild); // return first child

console.log(parent.lastElementChild);

console.log(child.nextElementSibling);

console.log(child.previousElementSibling);

hasChildNodes():-Checks whether the element has any child nodes.

parent.removeChild(child);

replaceChild():-Replaces one child element with another.
parent.replaceChild(newPara, child);
-->
