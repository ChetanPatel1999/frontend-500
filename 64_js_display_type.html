<!-- 
   there are 4 way o display js output
   1. display on console  :- console.log("output")
   2. display on document :- document.write("output")
   3. display on alert box :- alert("output")
   4. disply inside html elements. 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #222;
            color: white;
        }
    </style>
</head>

<body>


    <script>
        // wap to add  two numbers
        a = 12
        b = 5
        c = a + b
        console.log("addition = ", c)
        document.write("addition = ", c)
        alert("addition = " + c)
    </script>
</body>

</html>
