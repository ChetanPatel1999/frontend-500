<!-- 
CSS Transform
 Used to apply 2D transformations to an element
 like tranform in size , position , rotate etc.

 rotate
 transform: rotate(45deg);

 CSS Transform
 scale
 transform: scale(2);
 transform: scale(0.5);
 transform: scale(1, 2);
 transform: scaleX(0.5);
 transform: scaleY(0.5)

 CSS Transform
 translate
 transform: translate(20px);
 transform: translate(20px, 50px);
 transform: translateX(20px);
 transform: translateY(20px);

 CSS Transform
 skew
 transform: skew (30deg);
 -->
